apiVersion: v1
kind: Namespace
metadata:
  name: prod
  labels:
    area: prod
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-rq
  namespace: prod
spec:
  hard:
    cpu: "2"
    memory: "3Gi"
    pods: "8"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: limit-range-prod
  namespace: prod
spec:
  limits:
  - default: # this section defines default limits
      cpu: 200m
      memory: 128Mi
    defaultRequest: # this section defines default requests
      cpu: 61m
      memory: 71Mi
    max: # max and min define the limit range
      cpu: "1"
      memory: 512Mi
    min:
      cpu: 60m
      memory: 70Mi
    type: Container

