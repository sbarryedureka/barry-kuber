kind: Pod
metadata:
    name: bookshel-back
    labels:
      name: mysql
      version: "10"
      managed-by: db
      component: backend
      part-of: bookshelf
      instance: april2024
      env: prod
      client: xyz
spec:
  containers:
  - name: boxone
    image: docker.io/library/nginx:latest
    ports:
    - containerPort: 80
